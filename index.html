<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Weather Watch">
<title>Weather Watch for Tim</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #111720;
    --border: #1e2a38;
    --text: #c8d8e8;
    --muted: #4a5a6a;
    --rain: #3b9eff;
    --snow: #a8d8ff;
    --wind: #f0c060;
    --cold: #8855ff;
    --alert: #ff4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 1rem) env(safe-area-inset-right, 1rem) env(safe-area-inset-bottom, 2rem) env(safe-area-inset-left, 1rem);
    padding-top: max(env(safe-area-inset-top), 1.25rem);
    padding-bottom: max(env(safe-area-inset-bottom), 2rem);
    padding-left: max(env(safe-area-inset-left), 0.85rem);
    padding-right: max(env(safe-area-inset-right), 0.85rem);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -20%, rgba(59,158,255,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(136,85,255,0.06) 0%, transparent 60%);
  }

  header { text-align: center; margin-bottom: 1.25rem; }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 10vw, 4.5rem);
    letter-spacing: 0.04em;
    line-height: 1;
    color: #fff;
  }

  .subtitle {
    font-size: clamp(0.55rem, 2.4vw, 0.75rem);
    color: var(--muted);
    margin-top: 0.35rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.07em;
  }

  /* LEGEND */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem 0.7rem;
    justify-content: center;
    margin-bottom: 1.25rem;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    font-size: clamp(0.55rem, 2.1vw, 0.68rem);
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    white-space: nowrap;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* LOADING */
  #loading {
    text-align: center;
    padding: 3rem 1rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--rain);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* GRID — single column on phone, multi on wider screens */
  .days-grid {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
    max-width: 560px;
    margin: 0 auto 1.25rem;
  }

  @media (min-width: 600px) {
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
      max-width: 960px;
    }
  }

  /* DAY CARD */
  .day-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1rem 0.9rem;
    position: relative;
    overflow: hidden;
  }

  .day-card.has-alert {
    border-color: rgba(255,68,68,0.35);
    background: linear-gradient(135deg, #111720 0%, #1a1018 100%);
  }

  .day-card.all-clear { border-color: rgba(34,204,136,0.25); }

  .day-card.has-alert::before {
    content: '';
    position: absolute;
    top: -25px; right: -25px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(255,68,68,0.06);
    pointer-events: none;
  }

  .today-tag {
    position: absolute;
    top: 0; left: 0;
    background: linear-gradient(90deg, rgba(59,158,255,0.7), rgba(59,158,255,0));
    height: 3px; width: 55%;
    border-radius: 14px 0 0 0;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.65rem;
    gap: 0.5rem;
  }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.55rem, 7vw, 1.9rem);
    line-height: 1;
    color: #fff;
    letter-spacing: 0.03em;
  }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.58rem, 2vw, 0.66rem);
    color: var(--muted);
    margin-top: 0.2rem;
    letter-spacing: 0.04em;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.25rem 0.6rem;
    border-radius: 100px;
    font-size: clamp(0.58rem, 2vw, 0.68rem);
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.04em;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 0.1rem;
  }

  .status-badge.alert { background: rgba(255,68,68,0.12); color: #ff7070; border: 1px solid rgba(255,68,68,0.25); }
  .status-badge.clear { background: rgba(34,204,136,0.08); color: #22cc88; border: 1px solid rgba(34,204,136,0.2); }

  .badge-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: blink 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }

  .status-badge.clear .badge-dot { animation: none; }

  @keyframes blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.6); }
  }

  .high-temp {
    text-align: center;
    margin-bottom: 0.65rem;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.6rem, 2.2vw, 0.7rem);
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .high-temp span { color: var(--text); font-weight: 500; }

  /* CONDITION ROWS */
  .conditions { display: flex; flex-direction: column; gap: 0.4rem; }

  .condition-row {
    border-radius: 7px;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    overflow: hidden;
  }

  .condition-row.triggered {
    background: rgba(255,255,255,0.04);
    border-color: rgba(255,255,255,0.06);
  }

  .condition-main {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.48rem 0.6rem;
  }

  .condition-icon { font-size: 0.95rem; width: 19px; text-align: center; flex-shrink: 0; }

  .condition-label {
    font-size: clamp(0.68rem, 2.4vw, 0.76rem);
    color: var(--muted);
    flex: 1;
    min-width: 0;
  }

  .condition-row.triggered .condition-label { color: var(--text); }

  .condition-value {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.62rem, 2.1vw, 0.72rem);
    font-weight: 500;
    white-space: nowrap;
  }

  .condition-pill {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.55rem, 1.8vw, 0.63rem);
    padding: 0.12rem 0.48rem;
    border-radius: 100px;
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .rain-val  { color: var(--rain); }
  .snow-val  { color: var(--snow); }
  .wind-val  { color: var(--wind); }
  .cold-val  { color: var(--cold); }

  .rain-pill-on  { background: rgba(59,158,255,0.15);  color: var(--rain); border: 1px solid rgba(59,158,255,0.3); }
  .snow-pill-on  { background: rgba(168,216,255,0.12); color: var(--snow); border: 1px solid rgba(168,216,255,0.25); }
  .wind-pill-on  { background: rgba(240,192,96,0.12);  color: var(--wind); border: 1px solid rgba(240,192,96,0.25); }
  .cold-pill-on  { background: rgba(136,85,255,0.15);  color: var(--cold); border: 1px solid rgba(136,85,255,0.3); }
  .off-pill      { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid transparent; }

  /* TIMING SECTION */
  .timing-section {
    padding: 0.4rem 0.6rem 0.52rem 2.2rem;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  .timing-label-row {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.52rem, 1.8vw, 0.6rem);
    letter-spacing: 0.07em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .hour-track {
    display: flex;
    gap: 1.5px;
    height: 7px;
    margin-bottom: 0.22rem;
  }

  .hour-seg {
    flex: 1;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
  }

  .hour-seg.on-rain { background: var(--rain); opacity: 0.85; }
  .hour-seg.on-snow { background: var(--snow); opacity: 0.85; }
  .hour-seg.on-wind { background: var(--wind); opacity: 0.85; }
  .hour-seg.on-cold { background: var(--cold); opacity: 0.85; }

  .hour-axis {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.48rem, 1.6vw, 0.55rem);
    color: var(--muted);
    opacity: 0.45;
    margin-bottom: 0.28rem;
  }

  .timing-range-text {
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.6rem, 2vw, 0.66rem);
    color: var(--text);
    opacity: 0.75;
  }

  /* FOOTER */
  .footnote {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: clamp(0.52rem, 1.8vw, 0.62rem);
    color: var(--muted);
    letter-spacing: 0.05em;
    opacity: 0.55;
  }
</style>
</head>
<body>

<header>
  <h1>Weather Watch<br>for Tim</h1>
  <div class="subtitle">SEVERE CONDITIONS TRACKER · NEXT 5 DAYS</div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--rain)"></div>HEAVY RAIN</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--snow)"></div>ANY FROZEN PRECIP</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--wind)"></div>GUSTS &gt;22 mph</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--cold)"></div>TEMP &lt;30°F</div>
</div>

<div id="loading"><div class="spinner"></div><br>FETCHING LIVE HOURLY DATA…</div>
<div class="days-grid" id="days" style="display:none"></div>
<div class="footnote" id="footnote" style="display:none">OPEN-METEO · LIVE HOURLY · REFRESHES ON RELOAD</div>

<script>
// Portland, OR coordinates (SE 76th Ave area)
const LAT = 45.4971, LNG = -122.5709;

// Alert thresholds
const THRESH = {
  rain: 0.30,   // heavy rain = >0.30" cumulative in day (NWS heavy = >0.30"/hr but daily sum is a reasonable proxy)
  snow: 0,      // any frozen precipitation at all
  wind: 22,     // gusts > 22 mph
  cold: 30      // temp < 30°F
};

function fmtHour(h) {
  if (h === 0)  return '12am';
  if (h < 12)   return h + 'am';
  if (h === 12) return '12pm';
  return (h - 12) + 'pm';
}

function describeRuns(hours) {
  if (!hours.length) return '—';
  const runs = [];
  let s = hours[0], e = hours[0];
  for (let i = 1; i < hours.length; i++) {
    if (hours[i] === e + 1) { e = hours[i]; }
    else { runs.push([s, e]); s = e = hours[i]; }
  }
  runs.push([s, e]);
  return runs.map(([a, b]) => a === b ? fmtHour(a) : fmtHour(a) + '–' + fmtHour(b + 1)).join(', ');
}

function timingBlock(hours, colorKey) {
  const segs = Array.from({length: 24}, (_, i) =>
    `<div class="hour-seg ${hours.includes(i) ? 'on-' + colorKey : ''}"></div>`
  ).join('');

  return `
    <div class="timing-section">
      <div class="timing-label-row">When</div>
      <div class="hour-track">${segs}</div>
      <div class="hour-axis"><span>12am</span><span>6am</span><span>noon</span><span>6pm</span><span>11pm</span></div>
      <div class="timing-range-text">${describeRuns(hours)}</div>
    </div>`;
}

function renderCard(dateStr, hourly) {
  const idx = [];
  for (let i = 0; i < hourly.time.length; i++) {
    if (hourly.time[i].startsWith(dateStr)) idx.push(i);
  }
  if (!idx.length) return '';

  const temps      = idx.map(i => hourly.temperature_2m[i]);
  const precip     = idx.map(i => hourly.precipitation[i]);
  // snowfall covers snow; freezing_rain_equivalent covers sleet/freezing rain; showers of snow type
  // Open-Meteo: snowfall in cm, we convert. Also use weathercode to catch all frozen precip.
  const snowfall   = idx.map(i => hourly.snowfall[i]);          // cm water equiv snowfall
  const weathercode= idx.map(i => hourly.weathercode[i]);
  const gusts      = idx.map(i => hourly.wind_gusts_10m[i]);

  const high = Math.max(...temps), low = Math.min(...temps);
  const totalRain  = precip.reduce((a,b) => a+b, 0);           // inches
  const totalSnow  = snowfall.reduce((a,b) => a+b, 0);         // cm
  const maxGust    = Math.max(...gusts);

  // Weather codes for frozen precipitation:
  // 56,57 = freezing drizzle; 66,67 = freezing rain; 71–77 = snow variants;
  // 85,86 = snow showers; also snowfall > 0
  const frozenCodes = new Set([56,57,66,67,71,73,75,77,85,86]);
  const hasFrozen   = snowfall.some(s => s > 0) || weathercode.some(c => frozenCodes.has(c));

  // For rain alert: use heavy rain threshold on daily total
  const rainAlert = totalRain > THRESH.rain;
  const snowAlert = hasFrozen;              // any frozen precip at all
  const windAlert = maxGust > THRESH.wind;
  const coldAlert = low < THRESH.cold;
  const anyAlert  = rainAlert || snowAlert || windAlert || coldAlert;

  // Hours for timing bars
  const rainHrs = precip.map((p,h)  => p > 0.005   ? h : -1).filter(h => h >= 0);
  const snowHrs = idx.map((_,h) => {
    const code = weathercode[h];
    return (snowfall[h] > 0 || frozenCodes.has(code)) ? h : -1;
  }).filter(h => h >= 0);
  const windHrs = gusts.map((g,h)   => g > THRESH.wind ? h : -1).filter(h => h >= 0);
  const coldHrs = temps.map((t,h)   => t < THRESH.cold ? h : -1).filter(h => h >= 0);

  // Snow type label
  let frozenLabel = 'none';
  if (hasFrozen) {
    const types = [];
    if (snowfall.some(s => s > 0)) types.push('snow');
    if (weathercode.some(c => [56,57,66,67].includes(c))) types.push('freezing rain');
    frozenLabel = types.length ? types.join(' / ') : 'frozen precip';
  }

  const conditions = [
    { icon:'🌧', label:'Rainfall',
      value: totalRain > 0 ? `~${totalRain.toFixed(2)}"` : 'none',
      alert: rainAlert, color:'rain', hours: rainHrs },
    { icon:'❄️', label:'Frozen Precip',
      value: frozenLabel,
      alert: snowAlert, color:'snow', hours: snowHrs },
    { icon:'💨', label:'Wind Gusts',
      value: `${maxGust.toFixed(0)} mph`,
      alert: windAlert, color:'wind', hours: windHrs },
    { icon:'🥶', label:'Low Temp',
      value: `${low.toFixed(0)}°F`,
      alert: coldAlert, color:'cold', hours: coldHrs },
  ];

  const rows = conditions.map(c => `
    <div class="condition-row ${c.alert ? 'triggered' : ''}">
      <div class="condition-main">
        <span class="condition-icon">${c.icon}</span>
        <span class="condition-label">${c.label}</span>
        <span class="condition-value ${c.alert ? c.color+'-val' : ''}">${c.value}</span>
        <span class="condition-pill ${c.alert ? c.color+'-pill-on' : 'off-pill'}">${c.alert ? 'ALERT' : 'OK'}</span>
      </div>
      ${c.alert ? timingBlock(c.hours, c.color) : ''}
    </div>`).join('');

  const d       = new Date(dateStr + 'T12:00:00');
  const dayName = d.toLocaleDateString('en-US', {weekday:'long'});
  const dateFmt = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  const isToday = dateStr === new Date().toLocaleDateString('en-CA');

  return `
    <div class="day-card ${anyAlert ? 'has-alert' : 'all-clear'}">
      ${isToday ? '<div class="today-tag"></div>' : ''}
      <div class="card-header">
        <div>
          <div class="day-name">${dayName}${isToday ? ' <span style="font-size:0.9rem;color:var(--rain)">·</span>' : ''}</div>
          <div class="day-date">${dateFmt}${isToday ? ' · TODAY' : ''}</div>
        </div>
        <div class="status-badge ${anyAlert ? 'alert' : 'clear'}">
          <div class="badge-dot"></div>
          ${anyAlert ? 'WARNING' : 'CLEAR'}
        </div>
      </div>
      <div class="high-temp">HIGH <span>${high.toFixed(1)}°F</span> · LOW <span>${low.toFixed(1)}°F</span></div>
      <div class="conditions">${rows}</div>
    </div>`;
}

async function init() {
  try {
    // Open-Meteo: free, no API key, no Anthropic credits used
    const url = [
      'https://api.open-meteo.com/v1/forecast',
      '?latitude=' + LAT,
      '&longitude=' + LNG,
      '&hourly=temperature_2m,precipitation,snowfall,weathercode,wind_gusts_10m',
      '&temperature_unit=fahrenheit',
      '&wind_speed_unit=mph',
      '&precipitation_unit=inch',
      '&timezone=America%2FLos_Angeles',
      '&forecast_days=5'
    ].join('');

    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data   = await res.json();
    const hourly = data.hourly;
    const dates  = [...new Set(hourly.time.map(t => t.slice(0,10)))].slice(0,5);

    document.getElementById('loading').style.display = 'none';
    const grid = document.getElementById('days');
    grid.style.display = '';          // flex (set by .days-grid CSS)
    grid.innerHTML = dates.map(d => renderCard(d, hourly)).join('');
    document.getElementById('footnote').style.display = 'block';

  } catch(err) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#ff7070;font-family:'DM Mono',monospace;font-size:0.8rem;line-height:1.8">
        ⚠ COULD NOT LOAD WEATHER DATA<br>
        <span style="color:var(--muted);font-size:0.68rem">${err.message}</span>
      </div>`;
  }
}

init();
</script>
</body>
</html>
